# Baby Growth PWA — production stack for a Raspberry Pi (deploy via Portainer).
#
# Services:
#   app     — the PWA (server serves built client + API on :3000), HTTP only.
#   caddy   — reverse proxy that terminates HTTPS (auto Let's Encrypt) for your DOMAIN.
#   duckdns — OPTIONAL DuckDNS updater (only if you use DuckDNS). Behind the "duckdns" profile.
#
# DDNS: if your ROUTER updates the DDNS record (e.g. TP-Link tplinkdns.com), you do NOT need the
#       duckdns service — just `docker compose up -d` (starts app + caddy). For DuckDNS, run
#       `docker compose --profile duckdns up -d`.
#
# Copy .env.compose.example to .env (next to this file) and fill it in. See docs/Deployment.md.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: baby-growth-pwa:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000 # internal container port (do not change); the host port is APP_PORT below
      - DATABASE_PATH=/app/server/data/app.sqlite
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - APP_BASE_URL=https://${DOMAIN:?set DOMAIN (e.g. baby.tplinkdns.com) in .env}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}
      # Optional: pin VAPID keys across rebuilds (otherwise auto-generated + persisted in the DB).
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
    volumes:
      - app-data:/app/server/data
    # Publish the app on a host port (default 3001 to avoid a service already on 3000). Point your
    # existing reverse proxy at http://<pi>:${APP_PORT} for HTTPS on your domain.
    ports:
      - "${APP_PORT:-3001}:3000"

  # Bundled HTTPS. Caddy serves TLS on container port 443, published on the host as HTTPS_PORT
  # (default 8443, so it won't clash with anything already on the host's 80/443 — common on a Pi
  # running Pi-hole / Home Assistant). Forward your router's EXTERNAL 443 -> <pi>:${HTTPS_PORT}.
  # Caddy gets its Let's Encrypt cert via the TLS-ALPN-01 challenge over that forwarded 443.
  #
  # Don't want bundled HTTPS (you have your own reverse proxy)? Delete this whole `caddy:` service
  # and point your proxy at http://<pi>:${APP_PORT}. (Profiles are intentionally NOT used here —
  # Portainer doesn't activate them reliably.)
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTPS_PORT:-8443}:443"
    # Configure Caddy via its CLI (automatic HTTPS) instead of a bind-mounted Caddyfile —
    # single-file bind mounts are unreliable in Portainer git stacks.
    command: caddy reverse-proxy --from ${DOMAIN:?set DOMAIN (e.g. baby.tplinkdns.com)} --to app:3000
    volumes:
      - caddy-data:/data
      - caddy-config:/config

  # Nightly backup of the app-data volume (DB + all images) into BACKUP_DIR on the host
  # (default ./backups next to this file), keeping the newest BACKUP_KEEP files. WAL-safe:
  # the DB and its -wal/-shm files are tarred together, per the runbook's backup rule.
  # For real safety point BACKUP_DIR at a USB drive / network mount — see docs/Maintenance.md.
  backup:
    image: alpine:3
    restart: unless-stopped
    volumes:
      - app-data:/data:ro
      - ${BACKUP_DIR:-./backups}:/backups
    environment:
      - BACKUP_KEEP=${BACKUP_KEEP:-14}
    command: >
      sh -c 'while true; do
        ts=$$(date +%Y-%m-%d_%H%M);
        tar czf /backups/babycomm-$$ts.tgz -C /data . &&
        echo "backup written: babycomm-$$ts.tgz";
        ls -1t /backups/babycomm-*.tgz 2>/dev/null | tail -n +$$((BACKUP_KEEP+1)) | xargs -r rm -f;
        sleep 86400;
      done'

  # OPTIONAL — only for DuckDNS users. Start with: docker compose --profile duckdns up -d
  # TP-Link (tplinkdns.com) users: leave this off; the router updates DDNS itself.
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    restart: unless-stopped
    profiles: ["duckdns"]
    environment:
      - TZ=${TZ:-Europe/Vilnius}
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN:-}
      - TOKEN=${DUCKDNS_TOKEN:-}
      - UPDATE_IP=ipv4

volumes:
  app-data:
  caddy-data:
  caddy-config:
