# Baby Growth PWA — production stack for a Raspberry Pi (deploy via Portainer).
#
# Services:
#   app     — the PWA (server serves built client + API on :3000), HTTP only.
#   caddy   — reverse proxy that terminates HTTPS (auto Let's Encrypt) for your DOMAIN.
#   duckdns — OPTIONAL DuckDNS updater (only if you use DuckDNS). Behind the "duckdns" profile.
#
# DDNS: if your ROUTER updates the DDNS record (e.g. TP-Link tplinkdns.com), you do NOT need the
#       duckdns service — just `docker compose up -d` (starts app + caddy). For DuckDNS, run
#       `docker compose --profile duckdns up -d`.
#
# Copy .env.compose.example to .env (next to this file) and fill it in. See docs/Deployment.md.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: baby-growth-pwa:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/server/data/app.sqlite
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - APP_BASE_URL=https://${DOMAIN}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}
      # Optional: pin VAPID keys across rebuilds (otherwise auto-generated + persisted in the DB).
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
    volumes:
      - app-data:/app/server/data
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?set DOMAIN (e.g. baby.tplinkdns.com) in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # OPTIONAL — only for DuckDNS users. Start with: docker compose --profile duckdns up -d
  # TP-Link (tplinkdns.com) users: leave this off; the router updates DDNS itself.
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    restart: unless-stopped
    profiles: ["duckdns"]
    environment:
      - TZ=${TZ:-Europe/Vilnius}
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN:-}
      - TOKEN=${DUCKDNS_TOKEN:-}
      - UPDATE_IP=ipv4

volumes:
  app-data:
  caddy-data:
  caddy-config:
